## Go Flake Hunt Protocol (Mandatory for Go projects)

When working on Go tests, you MUST execute this protocol before declaring success.

### Step 1: Static flake-risk scan

Run pattern scan and report findings:
- `t.Parallel()` combined with global state mutations
- `os.Setenv` / `os.Unsetenv` in parallel tests
- `SetGlobal` / `NewWithGlobal` usage in parallel tests

Mandatory grep patterns:
- `t\.Parallel\(\)`
- `SetGlobal\(|NewWithGlobal\(`
- `os\.Setenv\(|os\.Unsetenv\(`

### Step 2: Stress matrix (required commands)

Execute all commands (or explain why impossible):
1. `go test -race -count=20 ./<package-path>/...`
2. `go test -race -count=20 -shuffle=on ./<package-path>/...`
3. `go test -count=100 ./<package-path>/...`
4. `go test -count=20 -parallel=1 ./<package-path>/...`

If any command fails, continue with isolation:
- `go test -run <FailedTestName> -count=200 ./<package-path>/...`
- `go test -run <FailedTestName> -count=200 -shuffle=on ./<package-path>/...`

### Step 3: Failure evidence contract (mandatory output)

You MUST provide:
- exact failing command
- failing test name
- shuffle seed (if shuffle used)
- shortest reproducible command
- suspected root cause category:
  - global state race
  - env mutation race
  - timing/sleep dependency
  - filesystem/shared resource conflict
  - nondeterministic assertion

### Step 4: Remediation rules

Never use `time.Sleep()` as primary flake fix.
Prefer:
- removing `t.Parallel()` for global-state tests
- save/restore global state via cleanup
- isolating env mutation and disabling parallel for such tests
- using explicit synchronization primitives instead of sleeps

### Completion gate

Do NOT mark task complete if flake protocol is not fully executed.

